<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat Client with JWT</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #authForm { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        #chatContainer { display: none; }
        #messages { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #messageInput { width: 70%; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
        .message { margin-bottom: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; }
        .my-message { background: #e3f2fd; text-align: right; }
        .system-message { color: #666; font-style: italic; }
        .error-message { color: #d32f2f; font-weight: bold; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #logoutBtn { background: #ff4444; color: white; border: none; border-radius: 4px; }
        #messageForm { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="authContainer">
        <h1>Авторизация</h1>
        <form id="authForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Логин:</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            
            <div class="form-group">
                <label for="chatId">Номер чата:</label>
                <input type="number" id="chatId" placeholder="Введите ID чата" required>
                <small>Должен быть целым числом</small>
            </div>
            
            <button type="submit">Войти</button>
        </form>
        <div id="authError" class="error-message"></div>
    </div>

    <div id="chatContainer">
        <div class="chat-header">
            <h1>Чат #<span id="currentChatId"></span></h1>
            <button id="logoutBtn" onclick="handleLogout()">Выход</button>
        </div>
        <div id="messages"></div>
        <form id="messageForm" onsubmit="sendMessage(); return false;">
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const WS_BASE_URL = 'ws://localhost:8000';
        let socket = null;
        let userId = null;
        let currentChatId = null;

        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const authError = document.getElementById('authError');
        const currentChatIdSpan = document.getElementById('currentChatId');
        const logoutBtn = document.getElementById('logoutBtn');
        const messageForm = document.getElementById('messageForm');

        document.addEventListener('DOMContentLoaded', () => {
            const accessToken = localStorage.getItem('access_token');
            const savedChatId = localStorage.getItem('chat_id');
            
            if (accessToken && savedChatId) {
                try {
                    const payload = JSON.parse(atob(accessToken.split('.')[1]));
                    userId = payload.sub;
                    currentChatId = parseInt(savedChatId);
                    authContainer.style.display = 'none';
                    chatContainer.style.display = 'block';
                    currentChatIdSpan.textContent = currentChatId;
                    connectToWebSocket(accessToken);
                } catch (e) {
                    console.error('Ошибка парсинга токена:', e);
                    clearAuthData();
                }
            }
        });

        async function handleLogin(event) {
            event.preventDefault();
            authError.textContent = '';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const chatIdInput = document.getElementById('chatId').value;
            
            if (!chatIdInput) {
                authError.textContent = 'Пожалуйста, укажите номер чата';
                return;
            }
            
            const chatId = parseInt(chatIdInput);
            if (isNaN(chatId)) {
                authError.textContent = 'Номер чата должен быть целым числом';
                return;
            }
            
            currentChatId = chatId;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const { access_token, refresh_token } = await response.json();
                    localStorage.setItem('access_token', access_token);
                    localStorage.setItem('refresh_token', refresh_token);
                    localStorage.setItem('chat_id', currentChatId.toString());
                    
                    const payload = JSON.parse(atob(access_token.split('.')[1]));
                    userId = payload.sub;
                    
                    authContainer.style.display = 'none';
                    chatContainer.style.display = 'block';
                    currentChatIdSpan.textContent = currentChatId;
                    connectToWebSocket(access_token);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    authError.textContent = errorData.detail || 'Ошибка авторизации';
                }
            } catch (error) {
                authError.textContent = 'Ошибка соединения с сервером';
                console.error('Auth error:', error);
            }
        }

        function connectToWebSocket(accessToken) {
            if (socket) {
                socket.close();
            }

            socket = new WebSocket(`${WS_BASE_URL}/ws/${currentChatId}?token=${encodeURIComponent(accessToken)}`);

            socket.onopen = function(e) {
                logMessage("Соединение установлено", "system-message");
            };

            socket.onmessage = function(event) {
                const message = JSON.parse(event.data);
                console.log('Получено сообщение:', message);
                
                const isMyMessage = message.sender_id == userId;
                logMessage(`${message.sender_id}: ${message.text}`, isMyMessage ? "my-message" : "message");
                
                if (!isMyMessage) {
                    sendReadReceipt(message.id);
                }
            };

            socket.onclose = function(event) {
                if (event.code === 1008) {
                    logMessage("Токен устарел, пытаемся обновить...", "system-message");
                    refreshTokenAndReconnect();
                } else {
                    const msg = event.wasClean 
                        ? `Соединение закрыто (код: ${event.code}, причина: ${event.reason})`
                        : 'Соединение прервано';
                    logMessage(msg, "system-message");
                }
            };

            socket.onerror = function(error) {
                logMessage(`Ошибка WebSocket: ${error.message}`, "error-message");
            };
        }


        async function handleLogout() {
            if (confirm("Вы уверены, что хотите выйти?")) {
                if (socket) {
                    socket.close();
                    socket = null;
                }               
                clearAuthData();
                showAuthForm();
                
                messagesDiv.innerHTML = '';
                logMessage("Вы вышли из системы", "system-message");
            }
        }

        function clearAuthData() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('chat_id');
            userId = null;
            currentChatId = null;
        }

        function showAuthForm() {
            authContainer.style.display = 'block';
            chatContainer.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('chatId').value = '';
            authError.textContent = '';
        }

        async function refreshTokenAndReconnect() {
            const refreshToken = localStorage.getItem('refresh_token');
            if (!refreshToken) {
                showAuthForm();
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${refreshToken}`
                    }
                });

                if (response.ok) {
                    const { access_token } = await response.json();
                    localStorage.setItem('access_token', access_token);
                    connectToWebSocket(access_token);
                } else {
                    logMessage("Сессия истекла, требуется повторная авторизация", "error-message");
                    showAuthForm();
                }
            } catch (error) {
                logMessage(`Ошибка обновления токена: ${error.message}`, "error-message");
                showAuthForm();
            }
        }

        function sendMessage() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                logMessage("Нет соединения с сервером", "error-message");
                return;
            }

            const text = messageInput.value.trim();
            if (!text) return;

            const message = {
                chat_id: currentChatId,
                text: text
            };

            socket.send(JSON.stringify(message));
            logMessage(`Вы: ${text}`, "my-message");
            messageInput.value = "";
        }

        function sendReadReceipt(messageId) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const receipt = {
                    type: "read",
                    message_id: messageId
                };
                socket.send(JSON.stringify(receipt));
                console.log(`Отправлено подтверждение прочтения для сообщения ${messageId}`);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function logMessage(message, type = "system-message") {
            const messageElement = document.createElement('div');
            messageElement.className = `${type} message`;
            messageElement.textContent = message;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
